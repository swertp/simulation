<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Räuber-Beute Simulation (Lotka-Volterra)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        canvas { border: 1px solid #ccc; background: #fafafa; margin-top: 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; background: #f0f0f0; padding: 15px; border-radius: 8px;}
        label { display: block; font-size: 14px; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
        .legend { margin-top: 10px; font-weight: bold; }
        .beute { color: green; }
        .raeuber { color: red; }
    </style>
</head>
<body>

    <h2>Lotka-Volterra Populationsdynamik</h2>
    <div class="legend">
        <span class="beute">■ Beute</span> | <span class="raeuber">■ Räuber</span>
    </div>
    
    <canvas id="simCanvas" width="800" height="400"></canvas>

    <div class="controls">
        <div>
            <label>Beute Wachstumsrate (α): <span id="valAlpha">0.1</span></label>
            <input type="range" id="alpha" min="0.01" max="0.2" step="0.01" value="0.1">
            
            <label>Beute Sterberate durch Räuber (β): <span id="valBeta">0.002</span></label>
            <input type="range" id="beta" min="0.001" max="0.01" step="0.001" value="0.002">
        </div>
        <div>
            <label>Räuber Wachstumsrate durch Beute (γ): <span id="valGamma">0.002</span></label>
            <input type="range" id="gamma" min="0.001" max="0.01" step="0.001" value="0.002">
            
            <label>Räuber Sterberate (δ): <span id="valDelta">0.1</span></label>
            <input type="range" id="delta" min="0.01" max="0.2" step="0.01" value="0.1">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elemente binden
        const inputs = ['alpha', 'beta', 'gamma', 'delta'];
        const params = {};

        function updateParams() {
            inputs.forEach(id => {
                const val = parseFloat(document.getElementById(id).value);
                params[id] = val;
                document.getElementById('val' + id.charAt(0).toUpperCase() + id.slice(1)).innerText = val;
            });
            drawSimulation();
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updateParams);
        });

        function drawSimulation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Startbedingungen
            let beute = 40;
            let raeuber = 20;
            const dt = 0.1; // Zeitschritt
            const steps = 2000; // Anzahl der berechneten Schritte
            
            let data = [{t: 0, b: beute, r: raeuber}];

            // Euler-Verfahren zur numerischen Integration
            for (let i = 1; i < steps; i++) {
                let db = (params.alpha * beute) - (params.beta * beute * raeuber);
                let dr = (params.gamma * beute * raeuber) - (params.delta * raeuber);
                
                beute += db * dt;
                raeuber += dr * dt;
                
                // Verhindern, dass Populationen negativ werden
                if (beute < 0) beute = 0;
                if (raeuber < 0) raeuber = 0;

                data.push({t: i, b: beute, r: raeuber});
            }

            // Skalierung für das Canvas
            const maxPop = Math.max(...data.map(d => Math.max(d.b, d.r)));
            const scaleY = (canvas.height - 20) / (maxPop > 0 ? maxPop : 1);
            const scaleX = canvas.width / steps;

            // Funktion zum Zeichnen einer Linie
            function drawLine(key, color) {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                for (let i = 0; i < data.length; i++) {
                    const x = i * scaleX;
                    const y = canvas.height - (data[i][key] * scaleY) - 10;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            drawLine('b', 'green'); // Beute
            drawLine('r', 'red');   // Räuber
        }

        // Initiale Zeichnung
        updateParams();
    </script>
</body>
</html>
